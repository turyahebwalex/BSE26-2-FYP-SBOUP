name: Build and push images to GHCR

# Builds happen on GitHub's runners (fast, reliable network) instead of on
# teammate laptops behind throttled / blocking campus links. Teammates then
# `docker compose pull` the resulting images and skip pip + HF model downloads
# entirely. See README / scripts/dev.sh for the consumer side.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'ai-services/**'
      - 'mobile/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: server
            context: ./server
          - service: client
            context: ./client
          - service: cv
            context: ./ai-services/cv-generation
          - service: matching
            context: ./ai-services/matching-engine
          - service: fraud
            context: ./ai-services/fraud-detection
          - service: learning
            context: ./ai-services/learning-engine
          - service: chatbot
            context: ./ai-services/chatbot-service
          - service: mobile
            context: ./mobile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Repository owner is lowercased here because GHCR requires lowercase
      # image paths and GitHub usernames can contain uppercase letters.
      - name: Compute image name
        id: img
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "tag=ghcr.io/${owner_lc}/sboup-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.img.outputs.tag }}:latest
            ${{ steps.img.outputs.tag }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
