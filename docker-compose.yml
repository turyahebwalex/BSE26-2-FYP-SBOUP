services:
  # ─── Data Layer ───
  # MongoDB runs as a standalone local container `sboup-mongo` (image mongo:7)
  # on the host's localhost:27017 — started outside this compose file (see
  # db-backups/README.md), not as a compose service. The Atlas M0 cluster was
  # the previous DB; its URI is kept commented in the root .env as a fallback.
  # Every service below uses network_mode: host, so MONGODB_URI=...localhost...
  # reaches this container on the host's port 27017.
  redis:
    image: redis:7-alpine
    container_name: sboup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sboup-network

  # ─── Application Services Layer ───
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      network: host
    container_name: sboup-server
    # Use the host's network stack so outbound calls (ESCO, etc.) reach the
    # internet on networks that block traffic from Docker's bridge subnet
    # (campus Wi-Fi, restrictive corporate LANs). Side effect: every other
    # service the server talks to must be reachable on localhost via the
    # port mappings each container already publishes.
    network_mode: host
    # Campus DNS — see matching-engine for why 8.8.8.8/public resolvers fail.
    dns: ${SERVICE_DNS:-9.9.9.9}
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CLIENT_URL=http://localhost:3000
      - MATCHING_SERVICE_URL=http://localhost:5001
      - FRAUD_DETECTION_SERVICE_URL=http://localhost:5002
      - CV_GENERATION_SERVICE_URL=http://localhost:5003
      - LEARNING_SERVICE_URL=http://localhost:5004
      - CHATBOT_SERVICE_URL=http://localhost:5005
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      # Google sign-in: GOOGLE_CLIENT_ID is the Web client ID the mobile app
      # requests its ID token for (see mobile LoginScreen.js) — the server must
      # verify the token's audience against the SAME id. Secret + callback are
      # only needed for the web redirect flow. All come from the root .env.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
    depends_on:
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  # ─── Presentation Layer ───
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      network: host
    container_name: sboup-client
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - sboup-network

  # ─── Intelligence Layer ───
  matching-engine:
    build:
      context: ./ai-services/matching-engine
      dockerfile: Dockerfile
      network: host
    container_name: sboup-matching
    # Host networking so the container reaches the local mongo on the host's
    # localhost:27017, and so outbound egress (Hugging Face, ESCO) uses the host
    # resolver — Docker's bridge embedded DNS (127.0.0.11) times out on some
    # campus/corporate Wi-Fi, the same reason server/fraud/cv/learning use host
    # mode. Port 5001 is already bound on the host directly.
    network_mode: host
    # The host runs systemd-resolved on 127.0.0.53, which Docker can't pass into
    # a container, so it falls back to 8.8.8.8 — blocked on some campus networks
    # (mak.ac.ug blocks 8.8.8.8 *and* public resolvers), causing an instant DNS
    # crash loop for Hugging Face downloads. SERVICE_DNS
    # is auto-set by scripts/dev.sh to the host's *current* upstream resolver, so
    # this works on ANY network (campus, mobile hotspot, home Wi-Fi). The 9.9.9.9
    # default (Quad9) is only the fallback for a bare `docker compose up` on a
    # network that doesn't block it; override via SERVICE_DNS in .env otherwise.
    dns: ${SERVICE_DNS:-9.9.9.9}
    environment:
      - FLASK_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      # Shared single source of truth for the db name (default `sboup`).
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-sboup}

  fraud-detection:
    build:
      context: ./ai-services/fraud-detection
      dockerfile: Dockerfile
      network: host
    container_name: sboup-fraud
    # Host networking so the container reaches the local mongo on the host's
    # localhost:27017 and its outbound egress uses the host resolver/route table
    # — the Docker bridge subnet is blocked on some campus/corporate Wi-Fi.
    # Matches server/cv-generation/learning-engine.
    network_mode: host
    # Campus DNS — see matching-engine for why 8.8.8.8/public resolvers fail.
    dns: ${SERVICE_DNS:-9.9.9.9}
    environment:
      - FLASK_ENV=development
      # Local MongoDB URI, taken from the root .env (single source of truth,
      # same as server/matching-engine/chatbot-service).
      - MONGODB_URI=${MONGODB_URI}
      # Shared single source of truth for the db name (default `sboup`).
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-sboup}

  cv-generation:
    image: ghcr.io/turyahebwalex/sboup-cv:latest
    build:
      context: ./ai-services/cv-generation
      dockerfile: Dockerfile
      network: host
    container_name: sboup-cv
    # Same reason as the server above: the campus Wi-Fi blocks egress from
    # Docker's bridge subnet, which breaks Hugging Face model downloads on
    # first start. Host networking uses the host's resolver and route table.
    network_mode: host
    # Campus DNS — see matching-engine for why 8.8.8.8/public resolvers fail.
    # cv pulls MiniLM + Flan-T5 + NER from huggingface.co on first start, so a
    # working resolver here is mandatory.
    dns: ${SERVICE_DNS:-9.9.9.9}
    environment:
      # Local MongoDB URI, taken from the root .env (single source of truth,
      # same as server/matching-engine/fraud-detection/chatbot-service).
      - MONGODB_URI=${MONGODB_URI}
      # Must match the db the server/seeder actually write to. The local mongo
      # URI pins the db name in its path (…/sboup) and the server connects
      # without an explicit dbName, so all data lands in `sboup`. Hardcoding a
      # different name here points this service at an empty db.
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-sboup}
      - STORAGE_BACKEND=${CV_STORAGE_BACKEND:-local}
      - LOCAL_STORAGE_DIR=/app/storage
      - PUBLIC_BASE_URL=${CV_PUBLIC_BASE_URL:-http://localhost:5003}
      - INTERNAL_API_KEY=${CV_INTERNAL_API_KEY:-}
      - HF_MODEL_CACHE_DIR=/app/model_cache
      - CV_PRESIGNED_URL_EXPIRY_SECONDS=3600
      - RATE_LIMIT_PER_USER_PER_MINUTE=3
      - LOG_LEVEL=INFO
    volumes:
      # Persist generated PDFs and model weights across container restarts so
      # the mobile client can continue to download CVs and we don't re-pull
      # ~820MB of HF model weights on every rebuild.
      - cv_storage:/app/storage
      - cv_model_cache:/app/model_cache

  learning-engine:
    image: ghcr.io/turyahebwalex/sboup-learning:latest
    build:
      context: ./ai-services/learning-engine
      dockerfile: Dockerfile
      network: host
    container_name: sboup-learning
    # Same reason as the cv-generation service: campus Wi-Fi blocks egress
    # from Docker's bridge subnet, breaking Hugging Face model downloads on
    # first start. Host networking uses the host's resolver and route table.
    network_mode: host
    # Campus DNS — see matching-engine for why 8.8.8.8/public resolvers fail.
    # learning pulls MiniLM + Flan-T5 + Skill NER from huggingface.co.
    dns: ${SERVICE_DNS:-9.9.9.9}
    environment:
      # Local MongoDB URI, taken from the root .env (single source of truth,
      # same as server/matching-engine/fraud-detection/chatbot-service).
      - MONGODB_URI=${MONGODB_URI}
      # Must match the db the server/seeder actually write to. The local mongo
      # URI pins the db name in its path (…/sboup) and the server connects
      # without an explicit dbName, so all data (users, profiles) lands in
      # `sboup`. Hardcoding `sboup_dev` here pointed learning-engine at an empty
      # db → every profile lookup returned PROFILE_NOT_FOUND (404) and the
      # mobile app showed "Learning service unavailable" on "Bridge a skill gap".
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-sboup}
      - INTERNAL_API_KEY=${LEARNING_INTERNAL_API_KEY:-}
      - HF_MODEL_CACHE_DIR=/app/model_cache
      - HF_SEMANTIC_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - HF_SUMMARY_MODEL=google/flan-t5-small
      - HF_SUMMARY_MAX_NEW_TOKENS=80
      - HF_SKILL_NER_MODEL=jjzha/jobbert_skill_extraction
      - SEMANTIC_MATCH_THRESHOLD=0.75
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - COURSERA_BASE_URL=https://api.coursera.org/api
      - EDX_BASE_URL=https://courses.edx.org/api
      - PROVIDER_HTTP_TIMEOUT_SECONDS=8
      - MATCHING_SERVICE_URL=http://localhost:5001
      - MATCHING_SERVICE_TIMEOUT_SECONDS=5
      - PORT=5004
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_USER_PER_MINUTE=10
    volumes:
      # Persist HF model weights across container restarts so we don't
      # re-pull MiniLM + Flan-T5-small + Skill NER on every rebuild.
      - learning_model_cache:/app/model_cache
    depends_on:
      - matching-engine

  chatbot-service:
    build:
      context: ./ai-services/chatbot-service
      dockerfile: Dockerfile
      network: host
    container_name: sboup-chatbot
    # Host networking so the container reaches the local mongo on the host's
    # localhost:27017, and so outbound egress (Hugging Face) uses the host
    # resolver — Docker's bridge embedded DNS (127.0.0.11) times out on some
    # campus/corporate Wi-Fi, the same reason server/fraud/cv/learning use host
    # mode. Port 5005 is already bound on the host directly.
    network_mode: host
    # Campus DNS — see matching-engine for why 8.8.8.8/public resolvers fail.
    # chatbot's knowledge base needs huggingface.co for MiniLM on first start.
    dns: ${SERVICE_DNS:-9.9.9.9}
    environment:
      - FLASK_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      # Shared single source of truth for the db name (default `sboup`).
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-sboup}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

  # ─── Mobile App (Expo Dev Server) ───
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
      network: host
    container_name: sboup-mobile
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      # By default the app auto-detects the backend from Metro's host (see
      # mobile/src/services/api.js), so any collaborator on the same Wi-Fi as
      # their phone just runs `docker compose up --build` — no IP config
      # needed. Set EXPO_PUBLIC_API_URL only to override (e.g. a public
      # tunnel URL for remote collaborators on different networks).
      - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL:-}
    depends_on:
      - server

volumes:
  redis_data:
  cv_storage:
  cv_model_cache:
  learning_model_cache:

networks:
  sboup-network:
    driver: bridge
